<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Sítio Campo Alegre</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }
  </style>
</head>

<body>
  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    const map = L.map('map', {
      minZoom: 17,
      maxZoom: 23
    });

    L.tileLayer('./{z}/{x}/{y}.jpg', {
      minZoom: 17,
      maxZoom: 23,
      tileSize: 256,
      tms: true
    }).addTo(map);

    map.setView([0.2578, -51.0124], 18);
  </script>
</body>
</html>
