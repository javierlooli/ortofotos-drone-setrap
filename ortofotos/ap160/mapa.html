<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ponte do Matapi</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">

  <style>
    html, body, #map {
      height: 100%;
      margin: 0;
    }

    .titulo {
      position: absolute;
      top: 15px;
      left: 55px;
      z-index: 1000;
      background: white;
      padding: 12px 16px;
      border-radius: 10px;
      font-family: Arial, sans-serif;
      box-shadow: 0 2px 12px rgba(0,0,0,.25);
    }
  </style>
</head>

<body>

<div class="titulo">
  <strong>Ponte do Matapi</strong><br>
  SETRAP / GTE
</div>

<div id="map"></div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>
const map = L.map('map').setView([0.064, -51.185], 16);

L.tileLayer('tiles/{z}/{x}/{y}.png', {
    minZoom: 14,
    maxZoom: 19,
    attribution: 'SETRAP / GTE'
}).addTo(map);

L.control.scale().addTo(map);
</script>

</body>
</html>
