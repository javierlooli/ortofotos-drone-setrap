<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>AP-160</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
html,body,#map{
    height:100%;
    margin:0;
}
</style>
</head>

<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var map = L.map('map',{
    center:[-0.6,-52.0],
    zoom:14
});

L.tileLayer('tiles/{z}/{x}/{y}.png',{
    minZoom:14,
    maxZoom:19
}).addTo(map);

</script>

</body>
</html>
